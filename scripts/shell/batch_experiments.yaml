polyinfo_base: &polyinfo_base
  dataset: polyinfo
  task_type: multi
  export_embeddings: true

insulator_base: &insulator_base
  dataset: insulator
  task_type: reg
  export_embeddings: true

htpmd_base: &htpmd_base
  dataset: htpmd
  task_type: reg
  # export_embeddings: true

tc_base: &tc_base
  dataset: tc
  task_type: reg
  export_embeddings: true

opv_base: &opv_base
  dataset: opv_camb3lyp
  task_type: reg
  export_embeddings: true

eaip_base: &eaip_base
  dataset: ea_ip
  task_type: reg
  polymer_type: copolymer
  export_embeddings: true
  save_predictions: true

block_base: &block_base
  dataset: block
  task_type: multi
  polymer_type: copolymer
  export_embeddings: true
  save_predictions: true

pae_tg_base: &pae_tg_base
  dataset: pae_tg
  task_type: reg
  polymer_type: copolymer
  export_embeddings: true
  save_predictions: true

opv_targets: &opv_targets
  # - optical_lumo
  # - gap
  # - homo
  # - lumo
  # - spectral_overlap
  # - delta_optical_lumo
  # - homo_extrapolated
  # - gap_extrapolated

eaip_targets: &eaip_targets
  - EA vs SHE (eV)
  - IP vs SHE (eV)

block_targets: &block_targets
  - phase_label

htpmd_targets: &htpmd_targets
  - Conductivity
  - Li Diffusivity
  - TFSI Diffusivity
  - Poly Diffusivity
  - Transference Number

pae_tg_targets: &pae_tg_targets
  - Tg  
  
