# =====================================================================
# BATCH EXPERIMENTS CONFIGURATION
# =====================================================================
#
# AVAILABLE MODELS & CAPABILITIES
# --------------------------------
#
# Graph Models (train_graph.py):
#   DMPNN, GIN, GAT        - full feature support (see table below)
#   wDMPNN                  - like DMPNN but no fusion/aux; copolymer OK
#   DMPNN_DiffPool          - homopolymer only, no fusion/aux
#   AttentiveFP             - homopolymer only, no fusion/aux
#   PPG                     - homopolymer only, no fusion/aux
#
#   Feature support matrix:
#     Option              DMPNN/GIN/GAT   wDMPNN   DiffPool/AFP/PPG
#     ─────────────────   ─────────────   ──────   ────────────────
#     incl_rdkit           yes             yes      yes
#     incl_desc            yes             yes      yes
#     copolymer_mode       yes             yes      no
#     fusion_mode: film    yes             no       no
#     film_layers          yes             no       no
#     aux_task             yes             no       no
#     split_type           yes             yes      no
#     export_embeddings    yes             yes      yes
#     save_predictions     yes             yes      yes
#
# Tabular (train_tabular.py):
#   Features:  incl_rdkit, incl_desc, incl_ab
#   Copolymer: polymer_type: copolymer, split_type: random|a_held_out
#   Note: incl_ab is only meaningful for copolymer datasets
#
# Identity Baseline (train_identity_baseline.py):
#   Copolymer only. Requires copolymer_mode: mix | interact
#   Optional: incl_desc, split_type: random|a_held_out
#
# COPOLYMER MODES (graph models only)
# ------------------------------------
#   mix            head gets [z]                  where z = fracA*z_A + fracB*z_B
#   mix_frac       head gets [z || fracA || fracB]
#   mix_frac_meta  head gets [z || frac || descriptors]           (needs incl_desc)
#   interact       head gets [z_A || z_B || |diff| || prod || frac]
#   interact_meta  head gets [z_A || z_B || |diff| || prod || frac || descriptors]  (needs incl_desc)
#
# DATASET FEATURE AVAILABILITY
# -----------------------------
#   tc         : rdkit, desc           (single target)
#   polyinfo   : rdkit                 (single target, classification)
#   insulator  : rdkit                 (single target)
#   htpmd      : rdkit, desc           (5 targets)
#   opv        : rdkit                 (8 targets)
#   ea_ip      : rdkit, ab             (2 targets, copolymer, NO desc)
#   block      : rdkit, desc, ab       (1 target, copolymer, classification)
#   pae_tg     : rdkit, desc, ab       (1 target, copolymer)
#
# =====================================================================

# ─────────────────────────────────────────────────────────────────────
# BASE CONFIGS
# ─────────────────────────────────────────────────────────────────────

polyinfo_base: &polyinfo_base
  dataset: polyinfo
  task_type: multi
  # export_embeddings: true

insulator_base: &insulator_base
  dataset: insulator
  task_type: reg
  # export_embeddings: true

htpmd_base: &htpmd_base
  dataset: htpmd
  task_type: reg
  # export_embeddings: true

tc_base: &tc_base
  dataset: tc
  task_type: reg
  # export_embeddings: true

opv_base: &opv_base
  dataset: opv_camb3lyp
  task_type: reg
  # export_embeddings: true

eaip_base: &eaip_base
  dataset: ea_ip
  task_type: reg
  polymer_type: copolymer
  export_embeddings: true
  save_predictions: true

block_base: &block_base
  dataset: block
  task_type: multi
  polymer_type: copolymer
  export_embeddings: true
  save_predictions: true

pae_tg_base: &pae_tg_base
  dataset: pae_tg
  task_type: reg
  polymer_type: copolymer
  export_embeddings: true
  save_predictions: true

# ─────────────────────────────────────────────────────────────────────
# TARGET LISTS
# ─────────────────────────────────────────────────────────────────────

opv_targets: &opv_targets
  # - optical_lumo
  - gap
  # - homo
  - lumo
  # - spectral_overlap
  # - delta_optical_lumo
  # - homo_extrapolated
  # - gap_extrapolated

eaip_targets: &eaip_targets
  - EA vs SHE (eV)
  - IP vs SHE (eV)

block_targets: &block_targets
  - phase_label

htpmd_targets: &htpmd_targets
  - Conductivity
  # - Li Diffusivity
  # - TFSI Diffusivity
  # - Poly Diffusivity
  # - Transference Number

pae_tg_targets: &pae_tg_targets
  - Tg

