  # ========== COPOLYMER DATASETS ==========
  # 5 modes: mix, mix_meta, mix_frac_meta, interact, interact_meta
  # "meta" modes require --incl_desc and/or --incl_rdkit for descriptor input
  
  # ----- Block copolymer -----
  
  # Mix (pure): z = fracA*z_A + fracB*z_B → head gets z only
  - <<: *block_base
    model: GAT
    walltime: "0:30:00"
    copolymer_mode: mix
    targets: *block_targets

   # Mix + frac: head gets [z || fracA || fracB]
  - <<: *block_base
    model: GAT
    walltime: "0:30:00"
    copolymer_mode: mix_frac
    targets: *block_targets
   
  # Mix + frac + meta: head gets [z || fracA || fracB || descriptors]
  - <<: *block_base
    model: GAT
    walltime: "0:30:00"
    copolymer_mode: mix_frac_meta
    targets: *block_targets
  
  # Interact (base): head gets [z_A || z_B || |diff| || prod || fracA || fracB]
  - <<: *block_base
    model: GAT
    walltime: "0:30:00"
    copolymer_mode: interact
    targets: *block_targets

  # Interact+meta: head gets [z_A || z_B || |diff| || prod || fracA || fracB || descriptors]
  - <<: *block_base
    model: GAT
    walltime: "0:30:00"
    copolymer_mode: interact_meta
    targets: *block_targets


