# Stage 2D Learning Curve — 2D1-arch @ 100% training groups
# Cloned from final Stage 2D config (batch_experiments.yaml, line 1768-1776)
# This MUST reproduce final Stage 2D results:
#   EA R²(Δ) ≈ 0.86, IP R²(Δ) ≈ 0.91

experiment:
  name: lc_final_2d1_arch_frac100
  description: "2D1-arch learning curve verification (100% = final)"

model:
  name: DMPNN
  copolymer_mode: stage2d_2d1_arch
  batch_norm: false

data:
  dataset: ea_ip
  split_type: a_held_out
  polymer_type: copolymer

training:
  epochs: 300
  patience: 30
  batch_size: 64
  seed: 42
  n_folds: 5

learning_curve:
  fraction: 1.00
  group_key: "smiles_A||smiles_B||fracA||fracB"

output:
  predictions_dir: predictions/HPG2Stage_LC_Final
  checkpoints_dir: checkpoints/HPG2Stage_LC_Final
  results_subdir: HPG2Stage_LC_Final
