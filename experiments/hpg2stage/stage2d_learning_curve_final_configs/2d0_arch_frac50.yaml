# Stage 2D Learning Curve — 2D0-arch @ corresponding fraction
# Cloned from final Stage 2D config (batch_experiments.yaml, line 1768-1776)
# Target: understand saturation behaviour.


experiment:
  name: lc_final_2d0_arch_frac50
  description: "2D0-arch learning curve verification (50% training groups)"

model:
  name: DMPNN
  copolymer_mode: stage2d_2d0_arch
  batch_norm: false

data:
  dataset: ea_ip
  split_type: a_held_out
  polymer_type: copolymer

training:
  epochs: 300
  patience: 30
  batch_size: 64
  seed: 42
  n_folds: 5

learning_curve:
  fraction: 0.50
  group_key: "smiles_A||smiles_B||fracA||fracB"

output:
  predictions_dir: predictions/HPG2Stage_LC_Final
  checkpoints_dir: checkpoints/HPG2Stage_LC_Final
  results_subdir: HPG2Stage_LC_Final
